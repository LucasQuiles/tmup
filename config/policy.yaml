dag:
  default_priority: 50
  max_retries: 3
  retry_backoff_base_seconds: 30
  stale_max_age_seconds: 300
  heartbeat_interval_seconds: 60
  claimed_duration_warning_seconds: 1800

grid:
  session_prefix: "tmup"
  # rows and cols are configurable positive integers. Default: 2x4 = 8 panes.
  # grid-setup.sh builds an NxM tmux layout from these values.
  rows: 2
  cols: 4
  width: 240
  height: 55

codex:
  # Fresh tmup workers launch as interactive Codex sessions in tmux panes.
  # gpt-5.4 already provides the large native context window; keep this value
  # explicit so the runtime contract is visible in prompts and docs.
  model: "gpt-5.4"
  context_window: 1050000
  auto_compact_token_limit: 750000
  approval_policy: "never"
  sandbox: "danger-full-access"
  no_alt_screen: true
  plan_first: true
  reasoning_effort: "high"
  reasoning_summary: "concise"
  plan_mode_reasoning_effort: "xhigh"
  verbosity: "low"
  service_tier: "fast"
  tool_output_token_limit: 50000
  web_search: "live"
  history_persistence: "save-all"
  enable_undo: true
  shell_env_inherit: "all"
  shell_snapshot: true
  enable_request_compression: true
  notifications: true
  background_terminal_max_timeout: 600000
  subagents:
    job_max_runtime_seconds: 3600
    max_threads: 6
    max_depth: 2
    tiers:
      # root pane worker: gpt-5.4 (set via codex.model above)
      # tier-1 (tmup-tier1): gpt-5.3-codex
      # tier-2 (tmup-tier2): gpt-5.2-codex

harvesting:
  capture_scrollback_lines: 500
  poll_interval_seconds: 30

timeouts:
  dispatch_trust_prompt_seconds: 6
  teardown_grace_seconds: 60
  pause_checkpoint_seconds: 30
  send_reprompt_seconds: 10

autonomy:
  full_participant_roles:
    - investigator
    - reviewer
  checkpoint_roles:
    - implementer
    - tester
    - refactorer
    - documenter

# Collaboration patterns (P5.6)
# Each pattern declares the minimum collaborative contract.
# Pattern selection is explicit on plans/tasks — not inferred from free text.
collaboration:
  patterns:
    - research
    - plan
    - implement
    - review
    - test
    - audit
    - document

# Lifecycle bridge (P5.1)
# Claude-native lifecycle events are ingested via shared bridge, not raw SQL.
lifecycle:
  prune_max_age_seconds: 86400  # 24 hours
  enabled_events:
    - claude_session_start
    - claude_session_end
    - claude_precompact
    - claude_task_completed
    - claude_subagent_stop
