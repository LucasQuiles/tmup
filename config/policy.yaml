dag:
  default_priority: 50
  max_retries: 3
  retry_backoff_base_seconds: 30
  stale_max_age_seconds: 300
  heartbeat_interval_seconds: 60
  claimed_duration_warning_seconds: 1800

grid:
  session_prefix: "tmup"
  # rows and cols are configurable positive integers. Default: 2x4 = 8 panes.
  # grid-setup.sh builds an NxM tmux layout from these values.
  rows: 2
  cols: 4
  width: 240
  height: 55

codex:
  # Fresh tmup workers launch as interactive Codex sessions in tmux panes.
  # "auto" omits -m and lets the installed Codex CLI resolve its default.
  # Explicit pins are requested values (never an observed-model claim) and
  # require policy enablement plus a per-dispatch validation receipt.
  model: "auto"
  explicit_model_pins_enabled: false
  # Direct shared SQLite/grid access is a trusted legacy mode. Safe supervisor-
  # owned Codex lanes leave this false and expose only their exact task temp.
  trusted_shared_state_enabled: false
  approval_policy: "never"
  sandbox: "workspace-write"
  no_alt_screen: true
  plan_first: true
  reasoning_effort: "high"
  reasoning_summary: "concise"
  plan_mode_reasoning_effort: "xhigh"
  verbosity: "low"
  service_tier: "fast"
  tool_output_token_limit: 50000
  web_search: "live"
  history_persistence: "save-all"
  # Keep the default command environment trimmed. A single dispatch may opt in
  # to broader inheritance through TMUP_CODEX_SHELL_INHERIT_OVERRIDE=all.
  shell_env_inherit: "core"
  shell_snapshot: true
  enable_request_compression: true
  notifications: true
  background_terminal_max_timeout: 600000
  subagents:
    job_max_runtime_seconds: 3600
    max_threads: 6
    max_depth: 1
    tiers:
      # root pane worker: CLI-selected (codex.model: "auto" omits -m above)
      # Dormant, default-off experimental adapter metadata. Installation and prompt exposure
      # require explicit post-canary enablement plus live catalog validation and a named-role selector receipt.
      tier1:
        model: "gpt-5.6-terra"
      tier2:
        model: "gpt-5.6-luna"

claude_code:
  # bypassPermissions lanes are same-UID trusted/unsandboxed and require a
  # separate direct-dispatch flag plus receipt even when policy enables them.
  trusted_unsandboxed_enabled: false

harvesting:
  capture_scrollback_lines: 500
  poll_interval_seconds: 30

timeouts:
  dispatch_trust_prompt_seconds: 6
  teardown_grace_seconds: 60
  pause_checkpoint_seconds: 30
  send_reprompt_seconds: 10

# Advisory supervisor-routing metadata. Safe workers cannot message directly;
# trusted shared-state mode does not mechanically enforce these recipient tiers.
autonomy:
  full_participant_roles:
    - investigator
    - reviewer
  checkpoint_roles:
    - implementer
    - tester
    - refactorer
    - documenter

# Collaboration patterns (P5.6)
# Each pattern declares the minimum collaborative contract.
# Pattern selection is explicit on plans/tasks — not inferred from free text.
collaboration:
  patterns:
    - research
    - plan
    - implement
    - review
    - test
    - audit
    - document

# Lifecycle bridge (P5.1)
# Claude-native lifecycle events are ingested via shared bridge, not raw SQL.
lifecycle:
  prune_max_age_seconds: 86400  # 24 hours
  enabled_events:
    - claude_session_start
    - claude_session_end
    - claude_precompact
    - claude_task_completed
    - claude_subagent_stop
